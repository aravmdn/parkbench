<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Empty inline icon so the browser doesn't request (and 404 on) /favicon.ico. -->
    <link rel="icon" href="data:," />
    <title>Parkbench — the park</title>
    <style>
      :root { color-scheme: dark; }
      html, body {
        margin: 0;
        height: 100%;
        background: #0b0e14;
        color: #e6e6e6;
        font-family: ui-monospace, "SFMono-Regular", Menlo, monospace;
      }
      #app {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
      }
      /* Kaplay injects its own <canvas>; keep it crisp for pixel art. */
      canvas {
        image-rendering: pixelated;
        max-width: 100%;
        max-height: 100vh;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
